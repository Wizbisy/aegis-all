version: 2.1

executors:
  node-executor:
    docker:
      - image: cimg/node:20.20
    working_directory: ~/repo

jobs:
  build-and-test:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Install Dependencies
          command: cd aegis && npm install
      - run:
          name: Generate Prisma Client
          command: cd aegis && DATABASE_URL="postgresql://dummy:dummy@localhost:5432/dummy" npm run prisma:generate
      - run:
          name: Run Tests
          command: |
            cd aegis
            mkdir -p test-results
            npx tsx --test --test-reporter=spec --test-reporter-destination=stdout --test-reporter=junit --test-reporter-destination=test-results/junit.xml test/**/*.test.ts
      - store_test_results:
          path: aegis/test-results
      - store_artifacts:
          path: aegis/test-results
      - run:
          name: Build TypeScript 
          command: cd aegis && NODE_OPTIONS=--max_old_space_size=2048 npm run build

  deploy-to-ec2:
    executor: node-executor
    steps:
      - add_ssh_keys:
          fingerprints:
            - "SHA256:ZW4NFjmF09Ej2/jAQ6uma+TtOJIB1MIqsWlotCQrSbI"
      - run:
          name: Deploy to AWS
          command: |
            ssh -p $SSH_PORT -o StrictHostKeyChecking=no $SSH_USER@$HOST_IP "cd aegis && git pull origin main && npm install && npm run prisma:generate && NODE_OPTIONS=--max_old_space_size=2048 npm run build && pm2 restart aegis-backend --update-env"

workflows:
  version: 2
  build-deploy:
    jobs:
      - build-and-test
      - deploy-to-ec2:
          requires:
            - build-and-test
          filters:
            branches:
              only: main