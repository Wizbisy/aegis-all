version: 2.1

executors:
  node-executor:
    docker:
      - image: cimg/node:20.0
    working_directory: ~/repo

jobs:
  build-and-test:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Install Dependencies
          command: npm install
      - run:
          name: Build TypeScript (with Swap Memory Allocation)
          command: NODE_OPTIONS=--max_old_space_size=2048 npm run build

  deploy-to-ec2:
    executor: node-executor
    steps:
      - add_ssh_keys:
          fingerprints:
            - "$SSH_KEY_FINGERPRINT"
      - run:
          name: Deploy to AWS
          command: |
            ssh -o StrictHostKeyChecking=no $SSH_USER@$HOST_IP "cd aegis && git pull origin main && npm install && NODE_OPTIONS=--max_old_space_size=2048 npm run build && pm2 restart aegis-backend --update-env"

workflows:
  version: 2
  build-deploy:
    jobs:
      - build-and-test
      - deploy-to-ec2:
          requires:
            - build-and-test
          filters:
            branches:
              only: main